# Nginx site config for lmsapi.vikashtechsolution.com
# Fixes HTTP 413 on large lecture video uploads (default client_max_body_size is 1m).
#
# Install on Ubuntu server:
#   sudo cp deploy/nginx-lmsapi.conf /etc/nginx/sites-available/lmsapi.vikashtechsolution.com
#   sudo ln -sf /etc/nginx/sites-available/lmsapi.vikashtechsolution.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# If you already have a site file, merge the client_max_body_size and proxy_* lines
# into your existing server { } block instead of replacing the whole file.

upstream online_course_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name lmsapi.vikashtechsolution.com;

    # Allow large lecture videos (multer limit is 2GB)
    client_max_body_size 2048M;

    location / {
        proxy_pass http://online_course_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

    }

    # Lecture uploads + HLS transcode can run many minutes
    location ~ ^/api/lectures/[^/]+/upload$ {
        client_max_body_size 2048M;
        proxy_pass http://online_course_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 300s;
        proxy_send_timeout 7200s;
        proxy_read_timeout 7200s;
        send_timeout 7200s;

        # Stream request body to Node instead of buffering entire file in nginx RAM
        proxy_request_buffering off;
    }
}

# If TLS is terminated here (certbot), duplicate the server block with:
#   listen 443 ssl http2;
#   ssl_certificate /etc/letsencrypt/live/lmsapi.vikashtechsolution.com/fullchain.pem;
#   ssl_certificate_key /etc/letsencrypt/live/lmsapi.vikashtechsolution.com/privkey.pem;
# and the same client_max_body_size / location blocks.
