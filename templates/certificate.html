<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

@page{
size:297mm 210mm;
margin:0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:297mm;
height:210mm;

background:#fafafa;

font-family:
Arial,
sans-serif;

-webkit-print-color-adjust:exact;
print-color-adjust:exact;

}

.page{

position:relative;

width:100%;
height:100%;

overflow:hidden;

background:#fafafa;

}

/* BORDER */

.border-frame{

position:absolute;

top:14px;
left:14px;
right:14px;
bottom:14px;

border:2px solid #dec5c5;

}

.border-frame::after{

content:"";

position:absolute;

inset:10px;

border:5px solid #b11c20;

}

/* WATERMARK */

.watermark{

position:absolute;

left:50%;
top:50%;

transform:
translate(
-50%,
-50%
);

font-size:300px;

font-weight:700;

font-family:
Arial;

color:
rgba(
0,
0,
0,
0.03
);

letter-spacing:-20px;

white-space:nowrap;

z-index:0;

}

/* CONTENT */

.content{

position:absolute;

inset:0;

display:flex;

flex-direction:column;

align-items:center;

padding:

40px
110px
35px;

z-index:5;

}

/* HEADER */

.header{

display:flex;

justify-content:center;

margin-top:6px;

}

.header img{

height:78px;

width:auto;

object-fit:contain;

}

/* TITLE */

.title{

margin-top:20px;

font-size:44px;

font-family:

"Playfair Display",
serif;

font-weight:500;

letter-spacing:10px;

color:#222;

}

.subtitle{

margin-top:4px;

font-size:14px;

letter-spacing:8px;

color:#666;

}

.subtitle::before,
.subtitle::after{

content:"";

display:inline-block;

width:55px;

height:1px;

background:#c85f5f;

vertical-align:middle;

margin:0 18px;

}

/* BODY */

.body-content{

display:flex;

flex-direction:column;

align-items:center;

margin-top:34px;

width:100%;

}

.certify-text{

font-size:18px;

color:#555;

}

.student-name{

margin-top:18px;

font-family:

"Playfair Display",
serif;

font-style:italic;

font-size:56px;

line-height:1.08;

color:#111;

text-align:center;

max-width:82%;

word-break:break-word;

}

.student-name-md{

font-size:42px;

}

.student-name-sm{

font-size:32px;

}

.student-divider{

width:62%;

height:1px;

background:#dcb4b4;

margin:

16px
0;

position:relative;

}

.student-divider::after{

content:"◆";

position:absolute;

left:50%;

top:50%;

transform:
translate(
-50%,
-50%
);

background:#fafafa;

padding:0 14px;

font-size:11px;

color:#b11c20;

}

.completed-text{

font-size:18px;

color:#555;

}

.course-title{

margin-top:18px;

font-size:26px;

font-weight:700;

line-height:1.2;

max-width:72%;

text-align:center;

color:#111;

}

.course-title-md{

font-size:22px;

}

.course-title-sm{

font-size:18px;

}

.date-text{

margin-top:18px;

font-size:16px;

font-style:italic;

color:#666;

}

.date-text::before,
.date-text::after{

content:"—";

margin:0 14px;

color:#c55;

}

/* SIGNATURE */

.signature-section{

display:flex;

flex-direction:column;

align-items:center;

margin-top:26px;

}

.signature-section img{

height:62px;

object-fit:contain;

opacity:.92;

}

.sign-line{

width:210px;

height:1px;

background:#d7d7d7;

margin-top:-8px;

}

.signer-name{

margin-top:12px;

font-size:18px;

font-weight:700;

color:#111;

}

.signer-role{

margin-top:4px;

font-size:13px;

color:#666;

}

/* FOOTER */

.footer{

width:100%;

display:flex;

justify-content:space-between;

padding:

0
140px;

margin-top:auto;

}

.footer-item{

display:flex;

flex-direction:column;

align-items:center;

}



.footer-icon{

width:40px;

height:40px;

display:block;

object-fit:contain;

margin-bottom:12px;

filter:
brightness(0)
saturate(100%)
invert(18%)
sepia(83%)
saturate(2654%)
hue-rotate(344deg)
brightness(92%)
contrast(92%);

}

/* LABEL */

.footer-label{

margin-top:6px;

padding-bottom: 6px;
font-size:12px;

font-style:italic;

color:#777;

}

/* DATE */

.footer-value{

font-size:18px;

font-weight:700;

color:#222;

padding-bottom: 6px;

}

/* CERT ID */

.cert-id{

margin-top:4px;

font-size:15px;

font-weight:600;

color:#333;
padding-bottom: 6px;


}

</style>
</head>

<body>

<div class="page">

<div class="border-frame"></div>

<div class="watermark">
VTS
</div>

<div class="content">

<div class="header">
<img src="{{LOGO_SRC}}">
</div>

<div class="title">
CERTIFICATE
</div>

<div class="subtitle">
OF COMPLETION
</div>

<div class="body-content">

<div class="certify-text">
This certificate is proudly presented to
</div>

<div class="student-name {{NAME_CLASS}}">
{{STUDENT_NAME}}
</div>

<div class="student-divider"></div>

<div class="completed-text">
for successfully completing
</div>

<div class="course-title {{COURSE_CLASS}}">
{{COURSE_TITLE}}
</div>

<div class="date-text">
Completed on {{ISSUED_DATE}}
</div>

</div>

<div class="signature-section">

<img src="{{SIGNATURE_SRC}}">

<div class="sign-line"></div>

<div class="signer-name">
Vikash Dubey
</div>

<div class="signer-role">
Founder & CEO, VTS
</div>

</div>

<div class="footer">

  <div class="footer-item">
  
    <img
    class="footer-icon"
    src="{{CALENDAR_SRC}}">
  
  <div class="footer-value">
  {{ISSUED_DATE}}
  </div>
  
  <div class="footer-label">
  Issue Date
  </div>
  
  </div>
  
  <div class="footer-item">
  
  
    <img
    class="footer-icon"
    src="{{BADGE_SRC}}">
  
  <div class="cert-id">
  {{CERTIFICATE_ID}}
  </div>
  
  <div class="footer-label">
  Certificate ID
  </div>
  
  </div>
  
  </div>

</div>

</div>

</body>
</html>
